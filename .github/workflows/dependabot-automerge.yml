name: Dependabot auto-merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Grouped PRs use the group id in the branch name; singles expose update-type.
      - name: Enable auto-merge for minor, patch, and security updates
        if: |
          contains(github.head_ref, '/npm-minor-patch') ||
          contains(github.head_ref, '/github-actions-minor-patch') ||
          contains(github.head_ref, '/npm-security') ||
          contains(github.head_ref, '/github-actions-security') ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'security-update'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
