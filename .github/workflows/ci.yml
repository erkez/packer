name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn

      - run: yarn install --immutable

      - run: yarn dedupe --check

      - run: yarn build

      - run: yarn lint

      - run: yarn docs:build

      - run: yarn workspace my-app build:prod

      - run: yarn workspace my-vite-app build:prod
