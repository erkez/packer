version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      npm-production:
        dependency-type: production
        patterns:
          - '*'
      npm-development:
        dependency-type: development
        patterns:
          - '*'
    commit-message:
      prefix: deps
      include: scope
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns:
          - '*'
    commit-message:
      prefix: deps
      include: scope
    labels:
      - dependencies
